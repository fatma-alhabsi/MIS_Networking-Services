<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MIS Helpdesk Register</title>

<script src="js/data.js"></script>
<script src="js/auth.js"></script>
<script src="js/theme.js"></script>

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#1e3c72,#2a5298);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}

.card{
background:white;
padding:40px;
width:360px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
text-align:center;
}

.card h2{
margin-bottom:25px;
}

.input-box{
margin-bottom:15px;
text-align:left;
}

.input-box input,
.input-box select{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ccc;
font-size:14px;
}

button{
width:100%;
padding:12px;
background:#2a5298;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#1e3c72;
}

.link{
margin-top:15px;
font-size:14px;
}

.link a{
color:#2a5298;
text-decoration:none;
font-weight:bold;
}

body.dark{
background:#121212;
}

body.dark .card{
background:#1e1e1e;
color:white;
}

body.dark input,
body.dark select{
background:#2a2a2a;
border:1px solid #444;
color:white;
}

</style>
</head>

<body>

<div class="card">

<h2>Create Account</h2>

<div class="input-box">
<input type="email" id="email" placeholder="Email">
</div>

<div class="input-box">
<input type="password" id="password" placeholder="Password">
</div>

<div class="input-box">
<select id="role">
<option value="client">Client</option>
<option value="technician">Technician</option>
</select>
</div>

<button onclick="register()">Register</button>

<div class="link">
Already have an account? <a href="login.html">Login</a>
</div>

</div>

<script>

if(localStorage.getItem("theme")==="dark"){
document.body.classList.add("dark");
}

</script>

</body>
</html>
